# 电网运维 RAG 智能问答系统 - 基础设施编排
# S1: mysql + minio | S5: + etcd + milvus-minio + milvus | S11: + backend

services:
  # ---------- MySQL：结构化元数据 ----------
  mysql:
    image: mysql:8.0
    container_name: grid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-grid_qa}
      MYSQL_USER: ${MYSQL_USER:-grid}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-grid123456}
      TZ: Asia/Shanghai
    ports:
      # 宿主机映射到 3307，避开本机已安装的 MySQL(3306)；容器内部仍为 3306
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- MinIO：源文档对象存储 ----------
  minio:
    image: minio/minio:latest
    container_name: grid-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # ---------- etcd：Milvus 元数据依赖 ----------
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: grid-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------- Milvus 专用对象存储（独立于业务 minio）----------
  milvus-minio:
    image: minio/minio:latest
    container_name: grid-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data

  # ---------- Milvus 2.4 向量库（2.4 的 pymilvus 支持 py3.13）----------
  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: grid-milvus
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped
    depends_on:
      - etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"   # gRPC（pymilvus 连接）
      - "9091:9091"     # 健康检查 / metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

volumes:
  mysql-data:
  minio-data:
  etcd-data:
  milvus-minio-data:
