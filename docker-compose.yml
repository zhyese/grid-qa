# 电网运维 RAG 智能问答系统 - 全栈编排
# S1: mysql + minio | S5: + etcd + milvus-minio + milvus | S11: + backend + frontend
# 一键启动: docker compose up -d --build

services:
  # ---------- MySQL：结构化元数据 ----------
  mysql:
    image: mysql:8.0
    container_name: grid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-grid_qa}
      MYSQL_USER: ${MYSQL_USER:-grid}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-grid123456}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"   # 宿主机 3307，避开本机 MySQL
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- MinIO：源文档对象存储 ----------
  minio:
    image: minio/minio:latest
    container_name: grid-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # ---------- etcd：Milvus 元数据依赖 ----------
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: grid-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------- Milvus 专用对象存储 ----------
  milvus-minio:
    image: minio/minio:latest
    container_name: grid-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data

  # ---------- Milvus 2.4 向量库 ----------
  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: grid-milvus
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped
    depends_on:
      - etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  # ---------- Redis：热点问答缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: grid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- 后端 ----------
  backend:
    build: ./backend
    container_name: grid-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - minio
      - milvus
      - redis
    env_file: .env
    environment:
      # 容器内用 service name + 内部端口连接（覆盖 .env 的 localhost）
      DATABASE_URL: mysql+aiomysql://grid:grid123456@mysql:3306/grid_qa?charset=utf8mb4
      MINIO_ENDPOINT: minio:9000
      MILVUS_HOST: milvus
    ports:
      - "8001:8001"

  # ---------- 前端（nginx）----------
  frontend:
    build: ./frontend
    container_name: grid-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
  minio-data:
  etcd-data:
  milvus-minio-data:
  redis-data:
