name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖（排除 sentence-transformers/torch，CI 不下载 bge 模型）
        run: |
          python -m pip install --upgrade pip
          grep -v "sentence-transformers" backend/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
      - name: golden 问答集格式校验（检索质量回归基准）
        run: python scripts/validate_golden.py
      - name: 单元测试（排除需后端服务的集成测试）
        run: python -m pytest tests/ -q --ignore=tests/test_api.py
      # 注：真实检索召回评测(python scripts/eval_retrieval.py)需 Milvus+embedding 服务，
      # 依赖运行态，不在此 CI 跑；改为本地/定时跑，报告归档 reports/，recall<92% 退出码1。
