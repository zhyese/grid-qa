name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖（排除 sentence-transformers/torch，CI 不下 bge 模型）
        run: |
          python -m pip install --upgrade pip
          grep -v "sentence-transformers" backend/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
      - name: 运行单元测试（跳过需服务的集成测试）
        run: python -m pytest tests/ -v -m "not integration"
