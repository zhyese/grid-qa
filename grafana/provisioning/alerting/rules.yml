# 电网运维 RAG 告警规则（Grafana 13 结构：folder + relativeTimeRange 必填）
# 数据源 uid=prometheus；触发 → 后端告警Webhook → 落操作日志(operate_type=告警)
apiVersion: 1

groups:
  - orgId: 1
    name: grid-qa-alerts
    folder: 电网运维 RAG
    interval: 30s
    rules:
      # 1) 基础组件下线（MySQL/MinIO/Milvus/Redis 任一探活失败）
      - uid: grid-component-down
        title: 基础组件下线
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: max(grid_component_health) by (component) == 0
              instant: true
              range: false
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "组件 {{ $labels.component }} 下线"
          description: "基础组件探活返回 0，可能影响问答/检索/知识库"
        labels:
          severity: critical
        isPaused: false

      # 2) 静默降级激增（5分钟内降级兜底 >10 次，多处失败被吞）
      - uid: grid-degraded-spike
        title: 静默降级激增
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(grid_degraded_total[5m])) > 10
              instant: true
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "5 分钟内静默降级 {{ $value }} 次"
          description: "多个兜底分支被触发，可能 Neo4j/rerank/缓存/百炼 等组件异常"
        labels:
          severity: warning
        isPaused: false

      # 3) 答案幻觉率 P95 超阈（答案可信度下降）
      - uid: grid-hallucination-high
        title: 答案幻觉率P95超阈
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(grid_hallucination_rate_bucket[5m])) by (le)) > 0.5
              instant: true
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "答案幻觉率 P95 = {{ $value }}（>0.5）"
          description: "检索证据支撑不足，建议排查检索召回/rerank/CRAG 配置"
        labels:
          severity: warning
        isPaused: false

      # 4) 安全事件命中（prompt injection 攻击）
      - uid: grid-safety-injection
        title: Prompt Injection 命中
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(grid_safety_block_total[5m])) > 0
              instant: true
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "5 分钟内 prompt injection 命中 {{ $value }} 次"
          description: "检测到越狱/注入尝试，关注是否有滥用"
        labels:
          severity: warning
        isPaused: false

      # 5) 电网危险操作关键词命中（接地/放电/带电/短路 等 critical 级别，任意命中即告警）
      - uid: grid-hazard-critical
        title: 电网危险操作(critical)关键词命中
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(grid_safety_keyword_total{category=~"接地安全|放电|带电作业|短路"}[5m])) > 0
              instant: true
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "5 分钟内 critical 类危险操作命中 {{ $value }} 次"
          description: "检测到接地/放电/带电作业/短路等关键危险操作关键词，需关注查询者意图"
        labels:
          severity: critical
        isPaused: false

      # 6) 电网危险操作关键词命中（误操作/倒闸/安全措施 等 warning 级别，>=3 次告警）
      - uid: grid-hazard-warning
        title: 电网危险操作(warning)关键词命中
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(grid_safety_keyword_total{category=~"误操作|倒闸操作|安全措施"}[5m])) >= 3
              instant: true
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "5 分钟内 warning 类危险操作命中 {{ $value }} 次"
          description: "检测到误操作/倒闸操作/安全措施违规等关键词，可能反映操作风险意识不足"
        labels:
          severity: warning
        isPaused: false

      # 7) 设备异常关键词激增（设备工况恶化信号，>=5 次）
      - uid: grid-hazard-device
        title: 设备异常关键词激增
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(grid_safety_keyword_total{category="设备异常"}[10m])) >= 5
              instant: true
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: "10 分钟内设备异常关键词命中 {{ $value }} 次"
          description: "设备异常类查询激增可能反映集中故障/巡视发现批量问题"
        labels:
          severity: info
        isPaused: false
